name: Refresh stats card

on:
  # Twice a day and on demand. Not on push, to avoid churn with the snake job.
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build stats.svg from the GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 assets/build_stats.py

      - name: Commit if the card changed
        run: |
          if ! git diff --quiet -- assets/stats.svg; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add assets/stats.svg
            git commit -m "chore: refresh stats card"
            git push
          fi
