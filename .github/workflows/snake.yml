name: Generate contribution snake

on:
  # Refresh a few times a day, on manual run, and whenever main changes.
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Render the snake SVG
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          # Purple palette to match the banner/footer.
          outputs: |
            dist/snake-purple.svg?color_snake=#b388ff&color_dots=#1a0b2e,#4a1d8e,#7b2ff7,#b388ff,#e9b3ff
            dist/snake.svg?palette=github-dark

      - name: Publish to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
